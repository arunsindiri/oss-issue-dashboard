<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>OSS Issue Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>OSS Issue Dashboard</h1>

    <form class="filters" method="get" action="/">
        <input type="text" name="q" placeholder="Search titles..." value="{{ q }}">
        <select name="repo">
            <option value="">All repos</option>
            {% for r in repos %}
            <option value="{{ r }}" {% if r == selected_repo %}selected{% endif %}>{{ r }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>

    <p class="count" id="count">{{ issues|length }} issues tracked</p>
    <table>
        <thead>
            <tr>
                <th>Repo</th>
                <th>#</th>
                <th>Title</th>
            </tr>
        </thead>
        <tbody id="issues-body">
            {% for issue in issues %}
            <tr>
                <td class="repo">{{ issue.repo }}</td>
                <td>{{ issue.number }}</td>
                <td><a class="title" href="{{ issue.url }}" target="_blank" rel="noopener">{{ issue.title }}</a></td>
            </tr>
            {% else %}
            <tr>
                <td class="no-results" colspan="3">No matching issues.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- Progressive enhancement: the form above already works via a normal
         GET request with no JS at all. This script takes over to filter
         live against /api/issues instead, without a full page reload. -->
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</body>
</html>
