<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>OSS Issue Dashboard</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 0.25rem; }
        .count { color: #666; margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
        th { color: #666; font-weight: 600; }
        .repo { color: #666; font-size: 0.9em; }
        form.filters { margin-bottom: 1.5rem; display: flex; gap: 0.5rem; }
        form.filters input, form.filters select { padding: 0.4rem; font-size: 1em; }
        form.filters input[type="text"] { flex: 1; }
    </style>
</head>
<body>
    <h1>OSS Issue Dashboard</h1>

    <form class="filters" method="get" action="/">
        <input type="text" name="q" placeholder="Search titles..." value="{{ q }}">
        <select name="repo">
            <option value="">All repos</option>
            {% for r in repos %}
            <option value="{{ r }}" {% if r == selected_repo %}selected{% endif %}>{{ r }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>

    <p class="count">{{ issues|length }} issues tracked</p>
    <table>
        <thead>
            <tr>
                <th>Repo</th>
                <th>#</th>
                <th>Title</th>
            </tr>
        </thead>
        <tbody>
            {% for issue in issues %}
            <tr>
                <td class="repo">{{ issue.repo }}</td>
                <td>{{ issue.number }}</td>
                <td><a href="{{ issue.url }}" target="_blank" rel="noopener">{{ issue.title }}</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
